<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fandom Intelligence Graph</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Righteous&family=Rubik:wght@400;700&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./src/css/main.css">
</head>
<body>
  <div id="app">
    <div class="header">
      <div class="header-left">
        <div class="pulse-dot"></div>
        <div>
          <h1 class="header-title">Fandom Intelligence Graph</h1>
          <div class="header-subtitle">Real-Time Internet Attention Map</div>
        </div>
      </div>
      <button class="btn-arcade" id="refresh-btn">Refresh Data</button>
    </div>

    <div class="container">
      <!-- Stats row -->
      <div class="stats-row" id="stats-row">
        <div class="stat-card"><div class="spinner"></div></div>
      </div>

      <!-- Graph link -->
      <a href="/graph" target="_blank" class="graph-link">
        <div class="graph-link-title">Open Interactive Knowledge Graph</div>
        <div class="graph-link-sub">Explore the full attention network in an interactive 3D-style visualization</div>
      </a>

      <!-- Main grid -->
      <div class="panels-grid">
        <!-- Rankings -->
        <div class="panel">
          <div class="panel-header">Anime Attention Rankings</div>
          <div class="panel-body" id="rankings">
            <div class="loading"><div class="spinner"></div>Loading...</div>
          </div>
        </div>

        <!-- Explosions -->
        <div class="panel">
          <div class="panel-header">Trend Explosion Detector</div>
          <div class="panel-body" id="explosions">
            <div class="loading"><div class="spinner"></div>Scanning...</div>
          </div>
        </div>
      </div>

      <!-- Signals -->
      <div class="panel">
        <div class="panel-header">Latest Signals</div>
        <div class="panel-body" id="signals" style="max-height: 400px;">
          <div class="loading"><div class="spinner"></div>Collecting...</div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="./src/js/main.js"></script>
</body>
</html>
